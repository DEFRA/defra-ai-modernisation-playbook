<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-GB" }}" data-theme="light">
  <head>
    {% include head.html %}
    <style>
      /* Global styles for proper centering */
      html, body {
        display: flex;
        justify-content: center;
        width: 100%;
        margin: 0;
        padding: 0;
      }

      body {
        flex-direction: column;
        align-items: center;
      }

      .content {
        overflow-x: auto; /* Changed from hidden to auto */
        max-width: 100%;
      }

      /* Center wrapper while maintaining responsiveness */
      .wrapper {
        margin: 0 auto !important;
        max-width: 1400px !important;
        padding-left: 2rem !important; /* Match the padding from the CSS */
        padding-right: 2rem !important; /* Match the padding from the CSS */
      }

      /* Extra fallback for very large font sizes  */
      @media screen and (max-width: 768px) {
        .wrapper {
          display: block !important;
          width: 100% !important;
          max-width: 100vw !important;
          margin: 0 auto !important;
          padding-left: 1.5rem !important; /* Match reduced padding for smaller screens */
          padding-right: 1.5rem !important; /* Match reduced padding for smaller screens */
        }

        .navigation, .content {
          width: 100% !important;
          max-width: 100% !important;
          box-sizing: border-box !important;
          padding: 0.5rem !important;
          margin: 0 auto !important;
        }

        /* Force text wrapping on small screens */
        .content * {
          max-width: 100% !important;
          overflow-wrap: break-word !important;
          word-wrap: break-word !important;
          word-break: break-word !important;
          hyphens: auto !important;
        }
      }

      @media screen and (max-width: 480px) {
        .wrapper {
          padding-left: 1rem !important; /* Match further reduced padding for smallest screens */
          padding-right: 1rem !important; /* Match further reduced padding for smallest screens */
        }

        /* Further improve content display on smallest screens */
        .content {
          padding-left: 0.25rem !important;
          padding-right: 0.25rem !important;
          overflow-x: hidden !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="navigation">
        {% include header.html %}
        {% include navigation.html %}
        {% include sidebar-footer.html %}
      </div>
      <div class="content">
        <section>
          {{ content }}
        </section>
        {% include govuk-footer.html %}
      </div>
    </div>
    <script>
      // Dark mode toggle functionality
      var themeToggle = document.querySelector('.theme-toggle-checkbox');
      var html = document.documentElement;

      // Check for saved theme preference, otherwise use system preference
      var getPreferredTheme = function() {
        var savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
          return savedTheme;
        }
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      };

      // Apply theme
      var setTheme = function(theme) {
        html.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        themeToggle.checked = theme === 'dark';
      };

      // Initial theme setup
      setTheme(getPreferredTheme());

      // Toggle theme
      themeToggle.addEventListener('change', function() {
        var newTheme = themeToggle.checked ? 'dark' : 'light';
        setTheme(newTheme);
      });

      // Listen for system theme changes
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
        if (!localStorage.getItem('theme')) {
          setTheme(e.matches ? 'dark' : 'light');
        }
      });
    </script>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        // Find all pre elements (common container for code blocks)
        var codeBlocks = document.querySelectorAll('pre');

        codeBlocks.forEach(function(codeBlock) {
          // Create the copy button
          var copyButton = document.createElement('button');
          copyButton.className = 'copy-code-button';
          copyButton.textContent = 'Copy';

          // Append the button to the pre element
          codeBlock.appendChild(copyButton);

          // Add click event listener
          copyButton.addEventListener('click', function() {
            // Find the code element within the pre element
            var codeElement = codeBlock.querySelector('code');
            var codeToCopy = codeElement ? codeElement.innerText : codeBlock.innerText;

            navigator.clipboard.writeText(codeToCopy).then(function() {
              // Success feedback
              copyButton.textContent = 'Copied!';
              setTimeout(function() {
                copyButton.textContent = 'Copy'; // Reset button text
              }, 2000); // Reset after 2 seconds
            }).catch(function(err) {
              console.error('Failed to copy code: ', err);
              copyButton.textContent = 'Error'; // Indicate failure
               setTimeout(function() {
                copyButton.textContent = 'Copy'; // Reset button text
              }, 2000);
            });
          });
        });
      });
    </script>
  </body>
</html>
