<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-GB" }}" data-theme="light">
  <head>
    {% include head.html %}
  </head>
  <body>
    <div class="wrapper">
      <div class="navigation">
        {% include header.html %}
        {% include navigation.html %}
        {% include sidebar-footer.html %}
      </div>
      <div class="content">
        <section>
          {{ content }}
        </section>
        {% include govuk-footer.html %}
      </div>
    </div>
    <script>
      // Dark mode toggle functionality
      var themeToggle = document.querySelector('.theme-toggle-checkbox');
      var html = document.documentElement;

      // Check for saved theme preference, otherwise use system preference
      var getPreferredTheme = function() {
        var savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
          return savedTheme;
        }
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      };

      // Apply theme
      var setTheme = function(theme) {
        html.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        themeToggle.checked = theme === 'dark';
      };

      // Initial theme setup
      setTheme(getPreferredTheme());

      // Toggle theme
      themeToggle.addEventListener('change', function() {
        var newTheme = themeToggle.checked ? 'dark' : 'light';
        setTheme(newTheme);
      });

      // Listen for system theme changes
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
        if (!localStorage.getItem('theme')) {
          setTheme(e.matches ? 'dark' : 'light');
        }
      });
    </script>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        // Find all pre elements (common container for code blocks)
        var codeBlocks = document.querySelectorAll('pre');

        codeBlocks.forEach(function(codeBlock) {
          // Create the copy button
          var copyButton = document.createElement('button');
          copyButton.className = 'copy-code-button';
          copyButton.textContent = 'Copy';

          // Append the button to the pre element
          codeBlock.appendChild(copyButton);

          // Add click event listener
          copyButton.addEventListener('click', function() {
            // Find the code element within the pre element
            var codeElement = codeBlock.querySelector('code');
            var codeToCopy = codeElement ? codeElement.innerText : codeBlock.innerText;

            navigator.clipboard.writeText(codeToCopy).then(function() {
              // Success feedback
              copyButton.textContent = 'Copied!';
              setTimeout(function() {
                copyButton.textContent = 'Copy'; // Reset button text
              }, 2000); // Reset after 2 seconds
            }).catch(function(err) {
              console.error('Failed to copy code: ', err);
              copyButton.textContent = 'Error'; // Indicate failure
               setTimeout(function() {
                copyButton.textContent = 'Copy'; // Reset button text
              }, 2000);
            });
          });
        });
      });
    </script>
  </body>
</html>
