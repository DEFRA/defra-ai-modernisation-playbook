theme: jekyll-theme-minimal
title: Defra AI in the SDLC Playbook
description: This playbook is a living document that aims to provide guidance on best practices for ways of working, tooling, and context-specific use cases for the use of AI in the Software Development Lifecycle (SDLC) tailored to Defra's unique needs and challenges.
baseurl: '/defra-ai-sdlc'
logo: /assets/images/defra-logo.svg
author: "Defra AI Capabilities and Enablement"
lang: "en-GB"
twitter:
  card: summary
social:
  name: "Department for Environment, Food & Rural Affairs"
  links:
    - "https://github.com/defra"
version: 2.0.3
css_version: 2.0.3

# Build settings
source: .
sass:
  style: compressed
  sass_dir: _sass
  load_paths:
    - _sass
    - node_modules

# Additional settings
markdown: kramdown
show_downloads: false
google_analytics: G-TMDY65DBCV
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-relative-links

# Front matter defaults
defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: "pages"
    values:
      layout: default

# Include files that are normally excluded
include:
  - CONTRIBUTING.md

# Exclude files from processing
exclude:
  - .obsidian/
  - defra-ai-sdlc-team/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - .gitignore
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - prompts/
  - scripts/
  - README.md