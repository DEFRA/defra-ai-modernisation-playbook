theme: jekyll-theme-minimal
title: AI-Enabled Legacy Modernisation Playbook
description: A step-by-step guide to using AI-assisted reverse engineering to produce Product Requirements Documents from legacy application artefacts, developed by Defra's Legacy Application Programme.
baseurl: '/defra-ai-modernisation-playbook'
logo: /assets/images/defra-logo.svg
author: "Defra"
lang: "en-GB"
twitter:
  card: summary
social:
  name: "Department for Environment, Food & Rural Affairs"
  links:
    - "https://github.com/defra"
version: 2.0.3
css_version: 2.0.3

# Build settings
source: .
sass:
  style: compressed
  sass_dir: _sass
  load_paths:
    - _sass
    - node_modules

# Additional settings
markdown: kramdown
show_downloads: false
google_analytics: G-TMDY65DBCV
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-relative-links

# Front matter defaults
defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: "pages"
    values:
      layout: default

# Exclude files from processing
exclude:
  - .obsidian/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - .gitignore
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - prompts/
  - scripts/
  - README.md